linter:
  enabled: true
  include:
    - "app/**/*.erb"
    - "demo/app/**/*.erb"
  exclude:
    - "node_modules/**/*"
    - "vendor/**/*"

formatter:
  enabled: true
  indentWidth: 2
  maxLineLength: 120  include:
    - "app/**/*.erb"
    - "demo/app/**/*.erb"  exclude:
    - "node_modules/**/*"
    - "vendor/**/*"
