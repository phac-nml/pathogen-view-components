---
en:
  pathogen:
    data_grid:
      empty_state:
        default: No rows found. Try adjusting filters or refreshing the data.
      error_state:
        message: Something went wrong while rendering this grid. Refresh or try again.
        title: Unable to load grid content
      keyboard:
        help: 'Keyboard: Arrow keys move cells; Enter or F2 enters controls; Escape
          returns to the grid.'
      scroll:
        hint: Scroll horizontally to view more columns.
      virtual:
        loaded: Rows loaded.
        loading: Loading rows…
        pagination:
          fetch_error: Unable to load more rows. Scroll to try again.
          loading_more: Loading more rows…
    form:
      switch:
        'off': 'Off'
        'on': 'On'
    label:
      required_indicator: "*"
      title: required
    link:
      aria-label: "%{content} (opens in a new window)"
    toast:
      dismiss: Dismiss notification
      dismiss_all: Dismiss all
      more_notifications: "+%{count} more"
      region_label: Notifications
      settings:
        description: Choose how long status notifications stay on screen before they
          disappear.
        label: Notification timing
        options:
          default: Default (6 seconds)
          extend: 20 seconds
          forever: Keep until I dismiss them
      type:
        error: Error
        info: Information
        success: Success
        warning: Warning
    tooltip:
      portal:
        aria_label: Tooltips
