name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  javascript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify lockfile
        run: pnpm install --frozen-lockfile

      - name: Lint JavaScript and ERB
        run: pnpm lint

      - name: Run JavaScript tests
        run: pnpm test

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint
        run: bin/bundle exec rubocop

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Verify bin scripts are executable
        run: test -x bin/rails && test -x bin/test

      - name: Test
        run: bin/test
