name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint
        run: bundle exec rubocop

      - name: Test
        run: |
          set -euo pipefail
          for f in $(find test -type f -name '*_test.rb' | sort); do
            echo "== $f =="
            bundle exec ruby -Itest "$f"
          done
