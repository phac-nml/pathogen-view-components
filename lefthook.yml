pre-commit:
  parallel: false
  jobs:
    - name: i18n_health
      run: bundle exec i18n-tasks health
    - name: prettier
      glob:
        - "*.js"
        - "**/*.js"
        - "*.json"
        - "**/*.json"
        - "*.md"
        - "**/*.md"
        - "*.css"
        - "**/*.css"
        - "*.yml"
        - "**/*.yml"
        - "*.yaml"
        - "**/*.yaml"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    - name: eslint
      glob:
        - "*.js"
        - "**/*.js"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
    - name: rubocop
      glob:
        - "*.rb"
        - "**/*.rb"
        - "*.rake"
        - "**/*.rake"
        - "*.gemspec"
        - "**/*.gemspec"
        - "*.ru"
        - "**/*.ru"
        - "Gemfile"
        - "**/Gemfile"
        - "Rakefile"
        - "**/Rakefile"
      run: bundle exec rubocop --force-exclusion -A {staged_files}
      stage_fixed: true
